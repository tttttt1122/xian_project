<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>死亡证明管理</title>
    <style>
        /* 全局样式重置 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
            background-color: #f0f2f5;
            color: #333;
            overflow: hidden;
        }

        /* 顶部导航栏 */
        .header {
            height: 64px;
            background: url('./header-bg.png') no-repeat center center;
            background-size: cover;
            display: flex;
            align-items: center;
            padding: 0 24px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
        }

        .header-logo {
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 16px;
            font-size: 28px;
            color: #fff;
        }

        .header-title {
            font-size: 20px;
            font-weight: 600;
            color: #fff;
            letter-spacing: 1px;
        }

        .header-right {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 20px;
            color: #fff;
        }

        .header-user {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            padding: 8px 12px;
            border-radius: 4px;
            transition: background 0.3s;
        }

        .header-user:hover {
            background: rgba(255, 255, 255, 0.15);
        }

        .user-avatar {
            width: 32px;
            height: 32px;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #1890ff;
            font-weight: bold;
        }

        /* 主体布局 */
        .main-container {
            display: flex;
            height: calc(100vh - 64px);
            margin-top: 64px;
        }

        /* 左侧菜单 */
        .sidebar {
            width: 220px;
            background: #ffffff;
            overflow-y: auto;
            overflow-x: hidden;
            transition: width 0.3s;
            border-right: 1px solid #e8e8e8;
        }

        .sidebar::-webkit-scrollbar {
            width: 6px;
        }

        .sidebar::-webkit-scrollbar-thumb {
            background: rgba(0, 0, 0, 0.1);
            border-radius: 3px;
        }

        /* 菜单样式 */
        .menu {
            padding: 8px 0;
        }

        .menu-item {
            position: relative;
        }

        .menu-parent {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            color: #333;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 14px;
            font-weight: 500;
        }

        .menu-parent:hover {
            color: #1890ff;
            background: #e6f7ff;
        }

        .menu-parent.active {
            color: #1890ff;
            background: #e6f7ff;
        }

        .menu-icon {
            width: 16px;
            height: 16px;
            margin-right: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            color: #666;
        }

        .menu-parent:hover .menu-icon,
        .menu-parent.active .menu-icon {
            color: #1890ff;
        }

        /* 右侧内容区域 */
        .content {
            flex: 1;
            overflow: auto;
            padding: 24px;
            background: #f0f2f5;
        }

        .content-body {
            background: #ffffff;
            border-radius: 8px;
            padding: 24px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
        }

        /* 搜索区域 */
        .search-area {
            background: #fafafa;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 24px;
            border: 1px solid #f0f0f0;
        }

        .search-row {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            margin-bottom: 16px;
        }

        .search-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .search-item label {
            font-size: 13px;
            color: #595959;
            white-space: nowrap;
        }

        .search-item input,
        .search-item select {
            padding: 6px 12px;
            border: 1px solid #d9d9d9;
            border-radius: 4px;
            font-size: 13px;
            width: 180px;
        }

        .search-item input:focus,
        .search-item select:focus {
            outline: none;
            border-color: #1890ff;
        }

        .search-item input[type="date"] {
            width: 160px;
        }

        .btn {
            padding: 6px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.3s;
            border: none;
        }

        .btn-primary {
            background: #1890ff;
            color: #fff;
        }

        .btn-primary:hover {
            background: #40a9ff;
        }

        .btn-default {
            background: #fff;
            color: #595959;
            border: 1px solid #d9d9d9;
        }

        .btn-default:hover {
            border-color: #1890ff;
            color: #1890ff;
        }

        .btn-success {
            background: #52c41a;
            color: #fff;
        }

        .btn-success:hover {
            background: #73d13d;
        }

        .btn-warning {
            background: #fa8c16;
            color: #fff;
        }

        .btn-warning:hover {
            background: #ffa940;
        }

        /* 表格样式 */
        .data-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }

        .data-table th,
        .data-table td {
            padding: 12px 16px;
            text-align: left;
            border-bottom: 1px solid #f0f0f0;
        }

        .data-table th {
            background: #fafafa;
            font-weight: 500;
            color: #595959;
        }

        .data-table tr:hover {
            background: #fafafa;
        }

        /* 操作按钮组 */
        .btn-group {
            display: flex;
            gap: 8px;
        }

        .btn-group .btn {
            padding: 4px 10px;
            font-size: 12px;
        }

        /* 分页样式 */
        .pagination {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 8px;
            margin-top: 24px;
            padding-top: 16px;
            border-top: 1px solid #f0f0f0;
        }

        .page-btn {
            padding: 6px 12px;
            border: 1px solid #d9d9d9;
            background: #fff;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
            color: #595959;
            transition: all 0.3s;
        }

        .page-btn:hover {
            border-color: #1890ff;
            color: #1890ff;
        }

        .page-btn.active {
            background: #1890ff;
            color: #fff;
            border-color: #1890ff;
        }

        .page-btn:disabled {
            cursor: not-allowed;
            opacity: 0.5;
        }

        .page-info {
            font-size: 13px;
            color: #595959;
            margin-right: 8px;
        }

        /* Tab样式 */
        .tab-container {
            margin-bottom: 24px;
        }

        .tab-content {
            margin-top: 20px;
        }

        .tab-header {
            display: flex;
            border-bottom: 2px solid #e8e8e8;
        }

        .tab-btn {
            padding: 10px 24px;
            font-size: 14px;
            font-weight: 500;
            color: #595959;
            background: none;
            border: none;
            cursor: pointer;
            position: relative;
            margin-right: 32px;
            transition: color 0.3s;
        }

        .tab-btn:hover {
            color: #1890ff;
        }

        .tab-btn.active {
            color: #1890ff;
        }

        .tab-btn.active::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            right: 0;
            height: 2px;
            background: #1890ff;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        /* 标签样式 */
        .tag {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 12px;
        }

        .tag-pending {
            background: #fff7e6;
            color: #fa8c16;
        }

        .tag-processed {
            background: #e6fffb;
            color: #13c2c2;
        }

        /* 卡片样式 */
        .card {
            background: #fff;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 16px;
            border: 1px solid #f0f0f0;
        }

        .card-title {
            font-size: 16px;
            font-weight: 500;
            margin-bottom: 16px;
            color: #262626;
        }

        .form-row {
            display: flex;
            flex-wrap: wrap;
            gap: 24px;
            margin-bottom: 16px;
        }

        .form-item {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .form-item label {
            font-size: 13px;
            color: #595959;
        }

        .form-item input,
        .form-item select,
        .form-item textarea {
            padding: 6px 12px;
            border: 1px solid #d9d9d9;
            border-radius: 4px;
            font-size: 13px;
            width: 220px;
        }

        .form-item textarea {
            width: 400px;
            height: 80px;
            resize: vertical;
        }

        .form-item input:focus,
        .form-item select:focus,
        .form-item textarea:focus {
            outline: none;
            border-color: #1890ff;
        }

        /* 附件列表 */
        .attachment-list {
            margin-top: 12px;
        }

        .attachment-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px;
            background: #fafafa;
            border-radius: 4px;
            margin-bottom: 8px;
        }

        .attachment-name {
            flex: 1;
            font-size: 13px;
            color: #595959;
        }

        /* 日志列表 */
        .log-list {
            margin-top: 12px;
        }

        .log-item {
            padding: 12px;
            background: #fafafa;
            border-radius: 4px;
            margin-bottom: 8px;
        }

        .log-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 6px;
        }

        .log-user {
            font-size: 13px;
            font-weight: 500;
            color: #262626;
        }

        .log-time {
            font-size: 12px;
            color: #8c8c8c;
        }

        .log-content {
            font-size: 13px;
            color: #595959;
        }

        /* 模态框 */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 2000;
            align-items: center;
            justify-content: center;
        }

        .modal-overlay.show {
            display: flex;
        }

        .modal-content {
            background: #fff;
            border-radius: 8px;
            width: 500px;
            max-height: 80vh;
            overflow-y: auto;
        }

        .modal-header {
            padding: 16px 20px;
            border-bottom: 1px solid #f0f0f0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-title {
            font-size: 16px;
            font-weight: 500;
        }

        .modal-close {
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border-radius: 50%;
            transition: background 0.3s;
        }

        .modal-close:hover {
            background: #f0f0f0;
        }

        .modal-body {
            padding: 20px;
        }

        .modal-footer {
            padding: 16px 20px;
            border-top: 1px solid #f0f0f0;
            display: flex;
            justify-content: flex-end;
            gap: 12px;
        }
    </style>
</head>
<body>
    <!-- 顶部导航栏 -->
    <header class="header">
        
        <div class="header-title">全民健康信息平台</div>
        <div class="header-right">
            <div class="header-user">
                <div class="user-avatar">管</div>
                <span>管理员</span>
            </div>
        </div>
    </header>

    <!-- 主体布局 -->
    <div class="main-container">
        <!-- 左侧菜单 -->
        <aside class="sidebar">
            <nav class="menu">
                <div class="menu-item">
                    <div class="menu-parent active" id="menu-todo" onclick="switchMenu('todo')">
                        <span class="menu-icon">☰</span>
                        <span>死亡证明待办</span>
                    </div>
                </div>
                <div class="menu-item">
                    <div class="menu-parent" id="menu-reissue" onclick="switchMenu('reissue')">
                        <span class="menu-icon">☰</span>
                        <span>死亡证明重办</span>
                    </div>
                </div>
            </nav>
        </aside>

        <!-- 右侧内容区域 -->
        <main class="content">
            <!-- 死亡证明待办页面 -->
            <div id="todo-page" class="content-body">
               
                
                <!-- Tab容器 -->
                <div class="tab-container">
                    <div class="tab-header">
                        <button class="tab-btn active" onclick="switchTodoTab('local')">死亡证明待办</button>
                        <button class="tab-btn" onclick="switchTodoTab('remote')">异地死亡证明查询</button>
                    </div>
                    
                    <!-- Tab内容：死亡证明待办 -->
                    <div class="tab-content active" id="tab-local">
                        <!-- 查询条件 -->
                        <div class="search-area">
                            <div class="search-row">
                                <div class="search-item">
                                    <label>报告地址</label>
                                    <input type="text" id="todo-address" placeholder="请输入报告地址">
                                </div>
                                <div class="search-item">
                                    <label>县区</label>
                                    <select id="todo-district">
                                        <option value="">全部</option>
                                        <option value="雁塔区">雁塔区</option>
                                        <option value="未央区">未央区</option>
                                        <option value="新城区">新城区</option>
                                        <option value="碑林区">碑林区</option>
                                    </select>
                                </div>
                                <div class="search-item">
                                    <label>报告机构</label>
                                    <input type="text" id="todo-org" placeholder="请输入报告机构">
                                </div>
                                <div class="search-item">
                                    <label>根本死因</label>
                                    <input type="text" id="todo-cause" placeholder="请输入根本死因">
                                </div>
                            </div>
                            <div class="search-row">
                                <div class="search-item">
                                    <label>姓名</label>
                                    <input type="text" id="todo-name" placeholder="请输入姓名">
                                </div>
                                <div class="search-item">
                                    <label>身份证号码</label>
                                    <input type="text" id="todo-idcard" placeholder="请输入身份证号码">
                                </div>
                                <div class="search-item">
                                    <label>死亡日期</label>
                                    <input type="date" id="todo-death-date">
                                </div>
                                <div class="search-item" style="margin-left: auto;">
                                    <button class="btn btn-primary" onclick="searchTodo()">查询</button>
                                    <button class="btn btn-default" onclick="resetTodoSearch()">重置</button>
                                </div>
                            </div>
                        </div>

                        <!-- 待办列表 -->
                        <table class="data-table">
                            <thead>
                                <tr>
                                    <th>姓名</th>
                                    <th>性别</th>
                                    <th>年龄</th>
                                    <th>身份证号码</th>
                                    <th>生前居住地址</th>
                                    <th>报卡单位</th>
                                    <th>根本死因</th>
                                    <th>死亡日期</th>
                                    <th>状态</th>
                                    <th>操作</th>
                                </tr>
                            </thead>
                            <tbody id="todoTable">
                                <!-- 模拟数据 -->
                            </tbody>
                        </table>

                        <!-- 分页 -->
                        <div class="pagination" id="todoPagination"></div>
                    </div>
                    
                    <!-- Tab内容：异地死亡证明查询 -->
                    <div class="tab-content" id="tab-remote">
                        <div class="search-area">
                            <div class="search-row">
                                <div class="search-item">
                                    <label>姓名</label>
                                    <input type="text" id="remote-name" placeholder="请输入姓名">
                                </div>
                                <div class="search-item">
                                    <label>身份证号码</label>
                                    <input type="text" id="remote-idcard" placeholder="请输入身份证号码">
                                </div>
                                <div class="search-item">
                                    <label>死亡日期</label>
                                    <input type="date" id="remote-death-date">
                                </div>
                                <div class="search-item" style="margin-left: auto;">
                                    <button class="btn btn-primary" onclick="searchRemote()">查询</button>
                                    <button class="btn btn-default" onclick="resetRemoteSearch()">重置</button>
                                </div>
                            </div>
                        </div>

                        <!-- 异地查询结果列表 -->
                        <table class="data-table">
                            <thead>
                                <tr>
                                    <th>姓名</th>
                                    <th>性别</th>
                                    <th>年龄</th>
                                    <th>身份证号码</th>
                                    <th>生前居住地址</th>
                                    <th>报卡单位</th>
                                    <th>根本死因</th>
                                    <th>死亡日期</th>
                                    <th>报告机构</th>
                                </tr>
                            </thead>
                            <tbody id="remoteTable">
                                <!-- 模拟数据 -->
                            </tbody>
                        </table>

                        <!-- 分页 -->
                        <div class="pagination" id="remotePagination"></div>
                    </div>
                </div>
            </div>

            <!-- 死亡证明重办页面 -->
            <div id="reissue-page" class="content-body" style="display: none;">
            
                
                <!-- 查询条件 -->
                <div class="search-area">
                    <div class="search-row">
                        <div class="search-item">
                            <label>报告地址</label>
                            <input type="text" id="reissue-address" placeholder="请输入报告地址">
                        </div>
                        <div class="search-item">
                            <label>县区</label>
                            <select id="reissue-district">
                                <option value="">全部</option>
                                <option value="雁塔区">雁塔区</option>
                                <option value="未央区">未央区</option>
                                <option value="新城区">新城区</option>
                                <option value="碑林区">碑林区</option>
                            </select>
                        </div>
                        <div class="search-item">
                            <label>报告机构</label>
                            <input type="text" id="reissue-org" placeholder="请输入报告机构">
                        </div>
                        <div class="search-item">
                            <label>根本死因</label>
                            <input type="text" id="reissue-cause" placeholder="请输入根本死因">
                        </div>
                    </div>
                    <div class="search-row">
                        <div class="search-item">
                            <label>姓名</label>
                            <input type="text" id="reissue-name" placeholder="请输入姓名">
                        </div>
                        <div class="search-item">
                            <label>身份证号码</label>
                            <input type="text" id="reissue-idcard" placeholder="请输入身份证号码">
                        </div>
                        <div class="search-item">
                            <label>死亡日期</label>
                            <input type="date" id="reissue-death-date">
                        </div>
                        <div class="search-item" style="margin-left: auto;">
                            <button class="btn btn-primary" onclick="searchReissue()">查询</button>
                            <button class="btn btn-default" onclick="resetReissueSearch()">重置</button>
                        </div>
                    </div>
                </div>

                <!-- 重办列表 -->
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>姓名</th>
                            <th>生前居住地址</th>
                            <th>报卡单位</th>
                            <th>年龄</th>
                            <th>根本死因</th>
                            <th>死亡日期</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="reissueTable">
                        <!-- 模拟数据 -->
                    </tbody>
                </table>

                <!-- 分页 -->
                <div class="pagination" id="reissuePagination"></div>
            </div>
        </main>
    </div>

    <!-- 申领人登记弹窗 -->
    <div class="modal-overlay" id="claimant-modal">
        <div class="modal-content">
            <div class="modal-header">
                <div class="modal-title">申领人登记</div>
                <div class="modal-close" onclick="closeModal('claimant-modal')">×</div>
            </div>
            <div class="modal-body">
                <div class="form-row">
                    <div class="form-item">
                        <label>申领人姓名</label>
                        <input type="text" id="claimant-name" placeholder="请输入姓名">
                    </div>
                    <div class="form-item">
                        <label>身份证号码</label>
                        <input type="text" id="claimant-idcard" placeholder="请输入身份证号码">
                    </div>
                    <div class="form-item">
                        <label>与死者关系</label>
                        <select id="claimant-relation">
                            <option value="">请选择</option>
                            <option value="配偶">配偶</option>
                            <option value="子女">子女</option>
                            <option value="父母">父母</option>
                            <option value="其他">其他</option>
                        </select>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-item">
                        <label>联系电话</label>
                        <input type="text" id="claimant-phone" placeholder="请输入联系电话">
                    </div>
                    <div class="form-item">
                        <label>联系地址</label>
                        <input type="text" id="claimant-address" placeholder="请输入联系地址">
                    </div>
                </div>
                <div class="form-item">
                    <label>备注</label>
                    <textarea id="claimant-remark" placeholder="请输入备注信息"></textarea>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-default" onclick="closeModal('claimant-modal')">取消</button>
                <button class="btn btn-primary" onclick="saveClaimant()">保存</button>
            </div>
