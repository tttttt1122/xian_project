<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>指标选择及指标对比 - 全民健康信息平台</title>
    <style>
        /* 全局样式重置 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
            background-color: #f0f2f5;
            color: #333;
            overflow: hidden;
        }

        /* 主体布局 - 全屏显示内容区域 */
        .main-container {
            display: flex;
            height: 100vh;
        }

        /* 内容区域 - 占据整个页面 */
        .content {
            flex: 1;
            overflow: auto;
            padding: 24px;
            background: #f0f2f5;
        }

        .content-body {
            background: #ffffff;
            border-radius: 8px;
            padding: 24px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
        }

        /* 页面标题 */
        .page-title {
            font-size: 18px;
            font-weight: 600;
            color: #262626;
            margin-bottom: 24px;
            padding-bottom: 12px;
            border-bottom: 1px solid #e8e8e8;
        }

        /* 搜索框 */
        .search-box {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
        }

        .search-input {
            flex: 1;
            padding: 10px 16px;
            border: 1px solid #d9d9d9;
            border-radius: 4px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        .search-input:focus {
            outline: none;
            border-color: #1890ff;
        }

        .btn {
            padding: 10px 24px;
            border: none;
            border-radius: 4px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: #1890ff;
            color: #fff;
        }

        .btn-primary:hover {
            background: #40a9ff;
        }

        .btn-success {
            background: #52c41a;
            color: #fff;
        }

        .btn-success:hover {
            background: #73d13d;
        }

        .btn-default {
            background: #f5f5f5;
            color: #595959;
        }

        .btn-default:hover {
            background: #e8e8e8;
        }

        .btn-danger {
            background: #ff4d4f;
            color: #fff;
        }

        .btn-danger:hover {
            background: #ff7875;
        }

        /* 卡片样式 */
        .card {
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
            padding: 20px;
            margin-bottom: 20px;
        }

        .card-title {
            font-size: 16px;
            font-weight: 600;
            color: #262626;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid #e8e8e8;
        }

        /* 表格样式 */
        .data-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }

        .data-table th {
            background: #fafafa;
            padding: 12px 16px;
            text-align: left;
            font-weight: 500;
            color: #595959;
            border-bottom: 1px solid #e8e8e8;
        }

        .data-table td {
            padding: 12px 16px;
            font-size: 14px;
            color: #595959;
            border-bottom: 1px solid #f0f0f0;
        }

        .data-table tbody tr:hover {
            background: #e6f7ff;
        }

        /* 标签样式 */
        .tag {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 500;
        }

        .tag-success {
            background: #f6ffed;
            color: #52c41a;
        }

        .tag-warning {
            background: #fff7e6;
            color: #fa8c16;
        }

        .tag-error {
            background: #fff2f0;
            color: #ff4d4f;
        }

        .tag-info {
            background: #e6f7ff;
            color: #1890ff;
        }

        /* 搜索表单样式 */
        .search-form {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            margin-bottom: 24px;
            padding: 24px;
            background: #fafafa;
            border-radius: 8px;
            border: 1px solid #f0f0f0;
        }

        .form-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .form-label {
            font-size: 14px;
            color: #595959;
            white-space: nowrap;
        }

        .form-input,
        .form-select {
            padding: 8px 12px;
            border: 1px solid #d9d9d9;
            border-radius: 4px;
            font-size: 14px;
            min-width: 180px;
            transition: all 0.3s;
            font-family: inherit;
        }

        .form-input:focus,
        .form-select:focus {
            outline: none;
            border-color: #1890ff;
            box-shadow: 0 0 0 3px rgba(24, 144, 255, 0.1);
        }

        /* 选择框样式 */
        .checkbox-group {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
        }

        .checkbox-item {
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
        }

        .checkbox-item input[type="checkbox"] {
            width: 16px;
            height: 16px;
            cursor: pointer;
        }

        /* 空状态 */
        .empty-state {
            text-align: center;
            padding: 40px;
            color: #8c8c8c;
        }

        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        /* 统计卡片 */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 24px;
        }

        .stat-card {
            background: #fff;
            border-radius: 8px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
        }

        .stat-value {
            font-size: 28px;
            font-weight: 600;
            color: #262626;
            margin-bottom: 8px;
        }

        .stat-label {
            font-size: 14px;
            color: #8c8c8c;
        }

        .stat-value.high {
            color: #ff4d4f;
        }

        .stat-value.medium {
            color: #fa8c16;
        }

        .stat-value.low {
            color: #52c41a;
        }

        /* 进度条 */
        .progress-bar {
            height: 8px;
            background: #f0f0f0;
            border-radius: 4px;
            overflow: hidden;
            margin: 8px 0;
        }

        .progress-fill {
            height: 100%;
            border-radius: 4px;
            transition: width 0.3s;
        }

        .progress-fill.high {
            background: #ff4d4f;
        }

        .progress-fill.medium {
            background: #fa8c16;
        }

        .progress-fill.low {
            background: #52c41a;
        }

        /* 模态框 */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }

        .modal-overlay.show {
            display: flex;
        }

        .modal {
            background: #fff;
            border-radius: 8px;
            width: 500px;
            max-width: 90%;
            overflow: hidden;
        }

        .modal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 20px;
            border-bottom: 1px solid #e8e8e8;
        }

        .modal-title {
            font-size: 16px;
            font-weight: 600;
            color: #262626;
        }

        .modal-close {
            font-size: 24px;
            color: #999;
            cursor: pointer;
            background: none;
            border: none;
            line-height: 1;
        }

        .modal-close:hover {
            color: #666;
        }

        .modal-body {
            padding: 20px;
        }

        .modal-footer {
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            padding: 16px 20px;
            border-top: 1px solid #e8e8e8;
        }

        /* 工具按钮组 */
        .toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .record-count {
            color: #8c8c8c;
            font-size: 14px;
        }

        .btn-group {
            display: flex;
            gap: 10px;
        }

        /* 分页样式 */
        .pagination {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 8px;
            margin-top: 24px;
            padding-top: 16px;
            border-top: 1px solid #f0f0f0;
        }

        .page-btn {
            padding: 6px 12px;
            border: 1px solid #d9d9d9;
            background: #fff;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
            color: #595959;
            transition: all 0.3s;
        }

        .page-btn:hover {
            border-color: #1890ff;
            color: #1890ff;
        }

        .page-btn.active {
            background: #1890ff;
            color: #fff;
            border-color: #1890ff;
        }

        .page-btn:disabled {
            cursor: not-allowed;
            opacity: 0.5;
        }

        .page-info {
            font-size: 13px;
            color: #595959;
            margin-right: 8px;
        }

        /* Tab切换样式 */
        .tabs {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
            padding-bottom: 12px;
            border-bottom: 1px solid #e8e8e8;
        }

        .tab {
            padding: 8px 20px;
            background: #f5f5f5;
            border: 1px solid #d9d9d9;
            border-radius: 4px 4px 0 0;
            cursor: pointer;
            font-size: 14px;
            color: #595959;
            transition: all 0.3s;
        }

        .tab.active {
            background: #fff;
            border-color: #1890ff;
            color: #1890ff;
            border-bottom: 1px solid #fff;
        }
    </style>
</head>
<body>
    <!-- 主体布局 -->
    <div class="main-container">
        <!-- 内容区域 -->
        <main class="content">
            <!-- Tab切换
            <div class="tabs">
                <div class="tab active" onclick="switchPage('select')">指标选择功能</div>
                <div class="tab" onclick="switchPage('compare')">指标结果对比</div>
            </div> -->

            <!-- 指标选择功能页面 -->
            <div id="selectPage" class="content-body">
                
                <!-- 搜索框 -->
                <div class="search-form">
                    <div class="form-item">
                        <span class="form-label">指标名称：</span>
                        <input type="text" id="searchInput" class="form-input" placeholder="请输入指标名称">
                    </div>
                    <div class="form-item">
                        <span class="form-label">指标类型：</span>
                        <select id="filterType" class="form-select">
                            <option value="">全部</option>
                            <option value="计数指标">计数指标</option>
                            <option value="均值指标">均值指标</option>
                            <option value="比率指标">比率指标</option>
                            <option value="评分指标">评分指标</option>
                        </select>
                    </div>
                    <div class="form-item">
                        <span class="form-label">所属分类：</span>
                        <select id="filterCategory" class="form-select">
                            <option value="">全部</option>
                            <option value="医疗服务">医疗服务</option>
                            <option value="医疗质量">医疗质量</option>
                            <option value="医疗费用">医疗费用</option>
                            <option value="患者体验">患者体验</option>
                        </select>
                    </div>
                    <div class="form-item">
                        <span class="form-label">数据来源：</span>
                        <select id="filterSource" class="form-select">
                            <option value="">全部</option>
                            <option value="HIS系统">HIS系统</option>
                            <option value="手术系统">手术系统</option>
                            <option value="财务系统">财务系统</option>
                            <option value="满意度调查">满意度调查</option>
                        </select>
                    </div>
                    <div class="form-item" style="margin-left: auto;">
                        <button onclick="searchIndex()" class="btn btn-primary">查询</button>
                        <button onclick="clearSearch()" class="btn btn-default">重置</button>
                    </div>
                </div>

                <!-- 工具栏 -->
                <div class="toolbar">
                    
                    <div class="btn-group">
                        <button class="btn btn-success" onclick="saveSelected()">保存选择</button>
                        
                    </div>
                </div>

                <!-- 指标列表 -->
                <div class="card">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>指标编码</th>
                                <th>指标名称</th>
                                <th>指标类型</th>
                                <th>所属分类</th>
                                <th>数据来源</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody id="indexTable">
                            <!-- 动态生成 -->
                        </tbody>
                    </table>
                    <!-- 分页 -->
                    <div id="indexPagination" class="pagination"></div>
                </div>
            </div>

            <!-- 指标结果对比页面 -->
            <div id="comparePage" class="content-body" style="display: none;">
                <!-- 搜索框 -->
                <div class="search-form">
                    <div class="form-item">
                        <span class="form-label">指标名称：</span>
                        <input type="text" id="compareSearchInput" class="form-input" placeholder="请输入指标名称">
                    </div>
                    <div class="form-item">
                        <span class="form-label">符合度等级：</span>
                        <select id="filterCompliance" class="form-select">
                            <option value="">全部</option>
                            <option value="high">高</option>
                            <option value="medium">中</option>
                            <option value="low">低</option>
                        </select>
                    </div>
                    <div class="form-item">
                        <span class="form-label">符合度范围：</span>
                        <input type="text" id="complianceMin" class="form-input" placeholder="最小值" style="width: 100px;">
                        <span style="margin: 0 4px;">-</span>
                        <input type="text" id="complianceMax" class="form-input" placeholder="最大值" style="width: 100px;">
                        <span style="color: #8c8c8c; font-size: 12px;">%</span>
                    </div>
                    <div class="form-item" style="margin-left: auto;">
                        <button onclick="searchCompare()" class="btn btn-primary">查询</button>
                        <button onclick="clearCompareSearch()" class="btn btn-default">重置</button>
                    </div>
                </div>

                <!-- 对比表格 -->
                <div class="card">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>指标名称</th>
                                <th>本地(BI)计算值</th>
                                <th>外部计算值</th>
                                <th>符合度</th>
                                <th>符合度等级</th>
                                <th>差异分析</th>
                            </tr>
                        </thead>
                        <tbody id="compareTable">
                            <!-- 动态生成 -->
                        </tbody>
                    </table>
                    <!-- 分页 -->
                    <div id="comparePagination" class="pagination"></div>
                </div>
            </div>
        </main>
    </div>

    <!-- 保存成功提示模态框 -->
    <div class="modal-overlay" id="successModal">
        <div class="modal">
            <div class="modal-header">
                <span class="modal-title">保存成功</span>
                <button class="modal-close" onclick="closeModal('successModal')">&times;</button>
            </div>
            <div class="modal-body" style="text-align: center; padding: 30px;">
                <div style="font-size: 48px; margin-bottom: 16px;">✓</div>
                <p>指标选择已成功保存！</p>
            </div>
            <div class="modal-footer">
                <button class="btn btn-primary" onclick="closeModal('successModal')">确定</button>
            </div>
        </div>
    </div>

    <!-- 指标对比弹窗 -->
    <div class="modal-overlay" id="compareModal">
        <div class="modal" style="width: 90%; max-width: 1000px; max-height: 80vh; overflow: hidden;">
            <div class="modal-header">
                <span class="modal-title">指标对比结果</span>
                <button class="modal-close" onclick="closeModal('compareModal')">&times;</button>
            </div>
            <div class="modal-body" style="max-height: calc(80vh - 120px); overflow-y: auto;">
                <div style="margin-bottom: 20px;">
                    <h4 style="color: #1890ff; font-size: 14px; margin-bottom: 12px;">已选择 <span style="color: #ff4d4f;">${selectedIndexes.length}</span> 个指标进行对比</h4>
                </div>
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>指标名称</th>
                            <th>本地(BI)计算值</th>
                            <th>外部计算值</th>
                            <th>符合度</th>
                            <th>符合度等级</th>
                            <th>差异分析</th>
                        </tr>
                    </thead>
                    <tbody id="compareModalTable">
                        <!-- 动态生成 -->
                    </tbody>
                </table>
                <!-- 弹窗分页 -->
                <div id="compareModalPagination" class="pagination" style="margin-top: 20px;"></div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-default" onclick="closeModal('compareModal')">关闭</button>
                
            </div>
        </div>
    </div>

    <script>
        // 模拟指标数据（保留5条，与对比数据对应，包含高、中、低三种符合度等级）
        const indexData = [
            { code: 'ZB001', name: '门诊就诊人次', type: '计数指标', category: '医疗服务', source: 'HIS系统' },
            { code: 'ZB003', name: '手术台次', type: '计数指标', category: '医疗服务', source: '手术系统' },
            { code: 'ZB006', name: '药占比', type: '比率指标', category: '医疗费用', source: '财务系统' },
            { code: 'ZB008', name: '门诊平均费用', type: '均值指标', category: '医疗费用', source: '财务系统' },
            { code: 'ZB009', name: '住院平均费用', type: '均值指标', category: '医疗费用', source: '财务系统' }
        ];

        // 模拟对比数据（保留5条，包含高、中、低三种符合度等级）
        const compareData = [
            { name: '门诊就诊人次', localValue: 12580, externalValue: 12560, compliance: 99.84 },
            { name: '手术台次', localValue: 1890, externalValue: 1905, compliance: 99.21 },
            { name: '药占比', localValue: 28.5, externalValue: 29.2, compliance: 97.60 },
            { name: '门诊平均费用', localValue: 268, externalValue: 285, compliance: 94.04 },
            { name: '住院平均费用', localValue: 12580, externalValue: 13500, compliance: 93.19 }
        ];

        // 分页参数
        const pageSize = 5; // 每页5条
        let currentIndexPage = 1;
        let currentComparePage = 1;
        let currentCompareModalPage = 1;

        // 已选择的指标
        let selectedIndexes = [];

        // 切换页面
        function switchPage(page) {
            // 更新Tab状态
            document.querySelectorAll('.tab').forEach(item => {
                item.classList.remove('active');
            });
            event.target.classList.add('active');

            // 切换页面显示
            document.getElementById('selectPage').style.display = 'none';
            document.getElementById('comparePage').style.display = 'none';
            document.getElementById(page + 'Page').style.display = 'block';

            // 如果是对比页面，重新渲染表格
            if (page === 'compare') {
                renderCompareTable();
            }
        }

        // 渲染指标选择表格（支持分页）
        function renderIndexTable(data = indexData, page = currentIndexPage) {
            const totalPages = Math.ceil(data.length / pageSize);
            const start = (page - 1) * pageSize;
            const end = start + pageSize;
            const pageData = data.slice(start, end);
            
            const table = document.getElementById('indexTable');
            table.innerHTML = pageData.map(item => {
                const isSelected = selectedIndexes.some(idx => idx.code === item.code);
                return `
                    <tr>
                        <td>${item.code}</td>
                        <td>${item.name}</td>
                        <td><span class="tag tag-info">${item.type}</span></td>
                        <td>${item.category}</td>
                        <td>${item.source}</td>
                        <td>
                            <button class="btn ${isSelected ? 'btn-danger' : 'btn-success'}" style="padding: 4px 12px; font-size: 12px;" onclick="selectSingle('${item.code}', '${item.name}')">
                                ${isSelected ? '取消选择' : '选择'}
                            </button>
                        </td>
                    </tr>
                `;
            }).join('');
            renderIndexPagination(totalPages, page);
        }

        // 渲染指标选择分页
        function renderIndexPagination(totalPages, currentPage) {
            const pagination = document.getElementById('indexPagination');
            let html = '';
            
            if (totalPages > 1) {
                html = `
                    <span class="page-info">第 ${currentPage} 页 / 共 ${totalPages} 页</span>
                    <button class="page-btn" onclick="goToIndexPage(1)" ${currentPage === 1 ? 'disabled' : ''}>首页</button>
                    <button class="page-btn" onclick="goToIndexPage(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''}>上一页</button>
                `;
                
                for (let i = 1; i <= totalPages; i++) {
                    html += `<button class="page-btn ${currentPage === i ? 'active' : ''}" onclick="goToIndexPage(${i})">${i}</button>`;
                }
                
                html += `
                    <button class="page-btn" onclick="goToIndexPage(${currentPage + 1})" ${currentPage === totalPages ? 'disabled' : ''}>下一页</button>
                    <button class="page-btn" onclick="goToIndexPage(${totalPages})" ${currentPage === totalPages ? 'disabled' : ''}>末页</button>
                `;
            } else {
                // 只有一页时也显示分页信息
                html = `<span class="page-info">第 ${currentPage} 页 / 共 ${totalPages} 页</span>`;
            }
            
            pagination.innerHTML = html;
        }

        // 跳转到指定指标页
        function goToIndexPage(page) {
            currentIndexPage = page;
            renderIndexTable(indexData, page);
        }

        // 单个选择/取消
        function selectSingle(code, name) {
            const index = selectedIndexes.findIndex(idx => idx.code === code);
            if (index > -1) {
                selectedIndexes.splice(index, 1);
            } else {
                selectedIndexes.push({ code, name });
            }
            renderIndexTable(indexData, currentIndexPage);
        }

        // 搜索指标
        function searchIndex() {
            const keyword = document.getElementById('searchInput').value.trim().toLowerCase();
            const type = document.getElementById('filterType').value;
            const category = document.getElementById('filterCategory').value;
            const source = document.getElementById('filterSource').value;
            
            currentIndexPage = 1; // 搜索时重置页码
            
            const filtered = indexData.filter(item => {
                const nameMatch = !keyword || item.name.toLowerCase().includes(keyword) || item.code.toLowerCase().includes(keyword);
                const typeMatch = !type || item.type === type;
                const categoryMatch = !category || item.category === category;
                const sourceMatch = !source || item.source === source;
                return nameMatch && typeMatch && categoryMatch && sourceMatch;
            });
            
            renderIndexTable(filtered, 1);
        }

        // 清除搜索
        function clearSearch() {
            document.getElementById('searchInput').value = '';
            document.getElementById('filterType').value = '';
            document.getElementById('filterCategory').value = '';
            document.getElementById('filterSource').value = '';
            renderIndexTable(indexData);
        }

        // 保存选择
        function saveSelected() {
            if (selectedIndexes.length === 0) {
                alert('请先选择需要对比的指标');
                return;
            }
            // 保存到本地存储
            localStorage.setItem('selectedIndexes', JSON.stringify(selectedIndexes));
            // 显示对比弹窗
            renderCompareModal();
            showModal('compareModal');
        }

        // 搜索对比指标
        function searchCompare() {
            const keyword = document.getElementById('compareSearchInput').value.trim().toLowerCase();
            const complianceLevel = document.getElementById('filterCompliance').value;
            const minCompliance = parseFloat(document.getElementById('complianceMin').value) || 0;
            const maxCompliance = parseFloat(document.getElementById('complianceMax').value) || 100;
            
            currentComparePage = 1; // 搜索时重置页码
            
            const filtered = compareData.filter(item => {
                const nameMatch = !keyword || item.name.toLowerCase().includes(keyword);
                const level = getComplianceLevel(item.compliance);
                const levelMatch = !complianceLevel || level === complianceLevel;
                const rangeMatch = item.compliance >= minCompliance && item.compliance <= maxCompliance;
                return nameMatch && levelMatch && rangeMatch;
            });
            
            renderCompareTable(filtered, 1);
        }

        // 清除对比搜索
        function clearCompareSearch() {
            document.getElementById('compareSearchInput').value = '';
            document.getElementById('filterCompliance').value = '';
            document.getElementById('complianceMin').value = '';
            document.getElementById('complianceMax').value = '';
            currentComparePage = 1;
            renderCompareTable(compareData, 1);
        }

        // 渲染对比表格（支持分页）
        function renderCompareTable(data = compareData, page = currentComparePage) {
            const totalPages = Math.ceil(data.length / pageSize);
            const start = (page - 1) * pageSize;
            const end = start + pageSize;
            const pageData = data.slice(start, end);
            
            const table = document.getElementById('compareTable');
            table.innerHTML = pageData.map(item => {
                const level = getComplianceLevel(item.compliance);
                const levelText = level === 'high' ? '高' : (level === 'medium' ? '中' : '低');
                const rowClass = level === 'low' ? 'style="background: #fff2f0;"' : '';
                
                return `
                    <tr ${rowClass}>
                        <td>${item.name}</td>
                        <td>${item.localValue}</td>
                        <td>${item.externalValue}</td>
                        <td>${item.compliance}%</td>
                        <td><span class="tag tag-${level === 'high' ? 'success' : (level === 'medium' ? 'warning' : 'error')}">${levelText}</span></td>
                        <td>${getDifferenceAnalysis(item)}</td>
                    </tr>
                `;
            }).join('');
            renderComparePagination(totalPages, page);
        }

        // 渲染对比页面分页
        function renderComparePagination(totalPages, currentPage) {
            const pagination = document.getElementById('comparePagination');
            let html = '';
            
            if (totalPages > 1) {
                html = `
                    <span class="page-info">第 ${currentPage} 页 / 共 ${totalPages} 页</span>
                    <button class="page-btn" onclick="goToComparePageNum(1)" ${currentPage === 1 ? 'disabled' : ''}>首页</button>
                    <button class="page-btn" onclick="goToComparePageNum(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''}>上一页</button>
                `;
                
                for (let i = 1; i <= totalPages; i++) {
                    html += `<button class="page-btn ${currentPage === i ? 'active' : ''}" onclick="goToComparePageNum(${i})">${i}</button>`;
                }
                
                html += `
                    <button class="page-btn" onclick="goToComparePageNum(${currentPage + 1})" ${currentPage === totalPages ? 'disabled' : ''}>下一页</button>
                    <button class="page-btn" onclick="goToComparePageNum(${totalPages})" ${currentPage === totalPages ? 'disabled' : ''}>末页</button>
                `;
            } else {
                // 只有一页时也显示分页信息
                html = `<span class="page-info">第 ${currentPage} 页 / 共 ${totalPages} 页</span>`;
            }
            
            pagination.innerHTML = html;
        }

        // 跳转到指定对比页
        function goToComparePageNum(page) {
            currentComparePage = page;
            renderCompareTable(page);
        }

        // 渲染对比弹窗表格
        function renderCompareModal(page = currentCompareModalPage) {
            // 根据选中的指标筛选对比数据
            const selectedNames = selectedIndexes.map(idx => idx.name);
            const filteredData = compareData.filter(item => selectedNames.includes(item.name));
            
            const totalPages = Math.ceil(filteredData.length / pageSize);
            const start = (page - 1) * pageSize;
            const end = start + pageSize;
            const pageData = filteredData.slice(start, end);
            
            const table = document.getElementById('compareModalTable');
            table.innerHTML = pageData.map(item => {
                const level = getComplianceLevel(item.compliance);
                const levelText = level === 'high' ? '高' : (level === 'medium' ? '中' : '低');
                const rowClass = level === 'low' ? 'style="background: #fff2f0;"' : '';
                
                return `
                    <tr ${rowClass}>
                        <td>${item.name}</td>
                        <td>${item.localValue}</td>
                        <td>${item.externalValue}</td>
                        <td>${item.compliance}%</td>
                        <td><span class="tag tag-${level === 'high' ? 'success' : (level === 'medium' ? 'warning' : 'error')}">${levelText}</span></td>
                        <td>${getDifferenceAnalysis(item)}</td>
                    </tr>
                `;
            }).join('');
            
            // 更新弹窗标题中的数量（使用实际对比的数据条数）
            const modalBody = document.querySelector('#compareModal .modal-body');
            modalBody.querySelector('h4').innerHTML = `共 <span style="color: #ff4d4f;">${filteredData.length}</span> 个指标进行对比`;
            
            renderCompareModalPagination(totalPages, page);
        }

        // 渲染对比弹窗分页
        function renderCompareModalPagination(totalPages, currentPage) {
            const pagination = document.getElementById('compareModalPagination');
            if (totalPages <= 1) {
                pagination.innerHTML = '';
                return;
            }
            
            let html = `
                <button class="page-btn" onclick="goToCompareModalPage(1)" ${currentPage === 1 ? 'disabled' : ''}>首页</button>
                <button class="page-btn" onclick="goToCompareModalPage(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''}>上一页</button>
            `;
            
            for (let i = 1; i <= totalPages; i++) {
                html += `<button class="page-btn ${currentPage === i ? 'active' : ''}" onclick="goToCompareModalPage(${i})">${i}</button>`;
            }
            
            html += `
                <button class="page-btn" onclick="goToCompareModalPage(${currentPage + 1})" ${currentPage === totalPages ? 'disabled' : ''}>下一页</button>
                <button class="page-btn" onclick="goToCompareModalPage(${totalPages})" ${currentPage === totalPages ? 'disabled' : ''}>末页</button>
            `;
            
            pagination.innerHTML = html;
        }

        // 跳转到指定弹窗页
        function goToCompareModalPage(page) {
            currentCompareModalPage = page;
            renderCompareModal(page);
        }

        // 获取符合度等级
        function getComplianceLevel(compliance) {
            if (compliance >= 98) return 'high';
            if (compliance >= 95) return 'medium';
            return 'low';
        }

        // 获取差异分析
        function getDifferenceAnalysis(item) {
            const diff = Math.abs(item.localValue - item.externalValue);
            const percentDiff = (diff / Math.max(item.localValue, item.externalValue) * 100).toFixed(1);
            
            if (item.compliance >= 98) {
                return `差异极小，符合度高`;
            } else if (item.compliance >= 95) {
                return `存在轻微差异(${percentDiff}%)，建议关注`;
            } else {
                return `差异较大(${percentDiff}%)，需重点核查`;
            }
        }

        // 显示模态框
        function showModal(modalId) {
            document.getElementById(modalId).classList.add('show');
        }

        // 关闭模态框
        function closeModal(modalId) {
            document.getElementById(modalId).classList.remove('show');
        }

        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            renderIndexTable();
            
            // 绑定搜索框回车键
            document.getElementById('searchInput').addEventListener('keyup', function(e) {
                if (e.key === 'Enter') {
                    searchIndex();
                }
            });

            // 页面加载时默认所有按钮为未选中状态
            selectedIndexes = [];
        });
    </script>
</body>
</html>
