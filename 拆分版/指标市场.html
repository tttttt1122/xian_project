<html lang="zh-CN">
<head>

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
            background-color: #f0f2f5;
            color: #333;
            overflow: hidden;
            height: 100vh;
        }

        .content {
            height: 100%;
            overflow: auto;
            padding: 24px;
            background: #f0f2f5;
        }

        .card {
            background: #ffffff;
            border: 1px solid #e8e8e8;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
        }

        .search-form {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            margin-bottom: 24px;
            padding: 24px;
            background: #fafafa;
            border-radius: 8px;
            border: 1px solid #f0f0f0;
        }

        .form-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .form-label {
            font-size: 14px;
            color: #595959;
            white-space: nowrap;
        }

        .form-input,
        .form-select {
            padding: 8px 12px;
            border: 1px solid #d9d9d9;
            border-radius: 4px;
            font-size: 14px;
            min-width: 180px;
            transition: all 0.3s;
            font-family: inherit;
        }

        .form-input:focus,
        .form-select:focus {
            outline: none;
            border-color: #1890ff;
            box-shadow: 0 0 0 3px rgba(24, 144, 255, 0.1);
        }

        .btn {
            padding: 8px 20px;
            border-radius: 4px;
            font-size: 14px;
            cursor: pointer;
            border: none;
            transition: all 0.3s;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .btn-primary {
            background: #1890ff;
            color: white;
        }

        .btn-primary:hover {
            background: #40a9ff;
        }

        .btn-default {
            background: #fff;
            color: #595959;
            border: 1px solid #d9d9d9;
        }

        .btn-default:hover {
            color: #1890ff;
            border-color: #1890ff;
        }

        .btn-sm {
            padding: 4px 12px;
            font-size: 12px;
        }

        .table-container {
            overflow-x: auto;
        }

        .data-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }

        .data-table th,
        .data-table td {
            padding: 12px 16px;
            text-align: left;
            border-bottom: 1px solid #f0f0f0;
        }

        .data-table th {
            background: #fafafa;
            font-weight: 600;
            color: #262626;
        }

        .data-table tr:hover {
            background: #f0f2f5;
        }

        .data-table .actions {
            display: flex;
            gap: 8px;
            justify-content: center;
        }

        .pagination {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 8px;
            padding: 16px;
            border-top: 1px solid #f0f0f0;
        }

        .page-btn {
            padding: 4px 12px;
            border: 1px solid #d9d9d9;
            border-radius: 4px;
            background: #fff;
            color: #595959;
            cursor: pointer;
            font-size: 13px;
        }

        .page-btn:hover:not(:disabled) {
            border-color: #1890ff;
            color: #1890ff;
        }

        .page-btn.active {
            background: #1890ff;
            color: #fff;
            border-color: #1890ff;
        }

        .page-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .page-info {
            margin-left: 16px;
            font-size: 13px;
            color: #8c8c8c;
        }

        .tag {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 500;
        }

        .tag-success {
            background: #f6ffed;
            border: 1px solid #b7eb8f;
            color: #52c41a;
        }

        .tag-blue {
            background: #e6f7ff;
            border: 1px solid #91d5ff;
            color: #1890ff;
        }

        .tag-purple {
            background: #f9f0ff;
            border: 1px solid #d3adf7;
            color: #722ed1;
        }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
        }

        .info-item {
            padding: 12px;
            background: #fafafa;
            border-radius: 6px;
        }

        .info-label {
            font-size: 12px;
            color: #8c8c8c;
            margin-bottom: 4px;
        }

        .info-value {
            font-size: 14px;
            color: #262626;
            font-weight: 500;
        }

        .chart-container {
            position: relative;
            height: 250px;
        }

        .stats-summary {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            padding: 12px;
            background: #f6ffed;
            border-radius: 6px;
        }

        .stats-text {
            font-size: 14px;
            color: #52c41a;
            font-weight: 500;
        }

        .usage-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .usage-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            background: #fafafa;
            border-radius: 6px;
            border-left: 3px solid #1890ff;
        }

        .usage-info h4 {
            font-size: 14px;
            color: #262626;
            margin-bottom: 4px;
        }

        .usage-info p {
            font-size: 12px;
            color: #8c8c8c;
        }

        .usage-count {
            font-size: 14px;
            font-weight: 600;
            color: #1890ff;
        }

        .lifecycle-timeline {
            position: relative;
            padding-left: 30px;
        }

        .lifecycle-timeline::before {
            content: '';
            position: absolute;
            left: 10px;
            top: 0;
            bottom: 0;
            width: 2px;
            background: #e8e8e8;
        }

        .timeline-item {
            position: relative;
            margin-bottom: 24px;
            transition: all 0.3s;
        }

        .timeline-item:hover {
            transform: translateX(5px);
        }

        .timeline-dot {
            position: absolute;
            left: -24px;
            top: 0;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            border: 3px solid #1890ff;
            background: #fff;
        }

        .timeline-dot.completed {
            background: #52c41a;
            border-color: #52c41a;
        }

        .timeline-dot.in-progress {
            background: #1890ff;
            border-color: #1890ff;
        }

        .timeline-dot.pending {
            background: #d9d9d9;
            border-color: #d9d9d9;
        }

        .timeline-content {
            background: #fafafa;
            border: 1px solid #e8e8e8;
            border-radius: 6px;
            padding: 14px;
        }

        .timeline-title {
            font-size: 15px;
            font-weight: 600;
            color: #262626;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .timeline-status {
            font-size: 12px;
            padding: 2px 8px;
            border-radius: 4px;
            font-weight: 500;
        }

        .timeline-status.completed {
            background: #f6ffed;
            color: #52c41a;
        }

        .timeline-status.in-progress {
            background: #e6f7ff;
            color: #1890ff;
        }

        .timeline-status.pending {
            background: #f5f5f5;
            color: #8c8c8c;
        }

        .timeline-detail {
            font-size: 13px;
            color: #595959;
            line-height: 1.6;
        }

        .timeline-time {
            font-size: 12px;
            color: #8c8c8c;
            margin-top: 6px;
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            display: none;
            justify-content: center;
            align-items: center;
            animation: fadeIn 0.2s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal-overlay.show {
            display: flex;
        }

        .modal {
            background: white;
            border-radius: 8px;
            width: 90%;
            max-width: 900px;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.2);
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from { transform: translateY(-20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .modal-header {
            padding: 16px 20px;
            border-bottom: 1px solid #e8e8e8;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            background: white;
            z-index: 1;
        }

        .modal-header h3 {
            font-size: 18px;
            color: #262626;
        }

        .modal-close {
            background: none;
            border: none;
            font-size: 24px;
            color: #8c8c8c;
            cursor: pointer;
            padding: 4px;
            transition: color 0.2s;
        }

        .modal-close:hover {
            color: #1890ff;
        }

        .modal-body {
            padding: 20px;
        }

        .modal-footer {
            padding: 16px 20px;
            border-top: 1px solid #e8e8e8;
            display: flex;
            justify-content: flex-end;
            gap: 12px;
        }

            background: #ffffff;
            border: 1px solid #e8e8e8;
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 16px;
        }

        .modal-card:last-child {
            margin-bottom: 0;
        }

        .modal-card-header {
            font-size: 15px;
            font-weight: 600;
            color: #262626;
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .stats-cards {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
        }

        .stat-card {
            flex: 1;
            background: #fafafa;
            border-radius: 6px;
            padding: 12px;
            text-align: center;
        }

        .stat-value {
            font-size: 20px;
            font-weight: 600;
            color: #1890ff;
        }

        .stat-label {
            font-size: 12px;
            color: #8c8c8c;
            margin-top: 4px;
        }
    </style>
</head>

                    <button class="page-btn">下一页</button>

                </div>
            </div>
        </div>
    </main>

        let chartInstance = null;

        function renderIndicatorList(filteredData = indicatorsData) {
            const listContainer = document.getElementById('indicatorList');
            listContainer.innerHTML = filteredData.map(indicator => `
                <tr>
                    <td>${indicator.name}</td>
                    <td><span class="tag ${indicator.type === 'atomic' ? 'tag-blue' : indicator.type === 'derived' ? 'tag-purple' : 'tag-success'}">${indicator.typeName}</span></td>
                    <td>${indicator.businessDomain}</td>
                    <td><span class="tag tag-success">已发布</span></td>
                    <td>${indicator.publishTime}</td>
                    <td class="actions">
                        <button class="btn btn-sm btn-primary" onclick="openIndicatorModal(${indicator.id})">详情</button>
                    </td>
                </tr>
            `).join('');
        }

        function searchIndicators() {
            const name = document.getElementById('searchName').value.toLowerCase();
            const type = document.getElementById('filterType').value;
            const domain = document.getElementById('filterDomain').value;

            const filtered = indicatorsData.filter(indicator => {
                const matchName = !name || indicator.name.toLowerCase().includes(name);
                const matchType = !type || indicator.type === type;
                const matchDomain = !domain || indicator.businessDomain === domain;
                return matchName && matchType && matchDomain;
            });

            renderIndicatorList(filtered);
        }

        function resetFilter() {
            document.getElementById('searchName').value = '';
            document.getElementById('filterType').value = '';
            document.getElementById('filterDomain').value = '';
            renderIndicatorList();
        }

        function openIndicatorModal(id) {
            const indicator = indicatorsData.find(i => i.id === id);
            if (!indicator) return;

            document.getElementById('modalTitle').textContent = `${indicator.name} - 指标详情`;
            document.getElementById('modalBody').innerHTML = `
                <div class="stats-cards">
                    <div class="stat-card">
                        <div class="stat-value">${indicator.totalAccess.toLocaleString()}</div>
                        <div class="stat-label">累计调用次数</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value">${indicator.timeCycle}</div>
                        <div class="stat-label">统计周期</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value">${indicator.authRoles.length}</div>
                        <div class="stat-label">授权角色数</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value">${indicator.authUsers.length}</div>
                        <div class="stat-label">授权用户数</div>
                    </div>
                </div>

                <div class="modal-card">
                    <div class="modal-card-header">
                        基本信息
                    </div>
                    <div class="info-grid">

                            <div class="info-value">${indicator.name}</div>
                        </div>
                        <div class="info-item">

                            <div class="info-value">${indicator.typeName}</div>
                        </div>
                        <div class="info-item">
                            <div class="info-label">业务域</div>
                            <div class="info-value">${indicator.businessDomain}</div>
                        </div>
                        <div class="info-item">
                            <div class="info-label">时间周期</div>
                            <div class="info-value">${indicator.timeCycle}</div>
                        </div>
                        <div class="info-item">
                            <div class="info-label">业务口径</div>
                            <div class="info-value">${indicator.businessCaliber}</div>
                        </div>
                        <div class="info-item">
                            <div class="info-label">数据源</div>
                            <div class="info-value">${indicator.dataSource}</div>
                        </div>
                        ${indicator.modifier ? `
                        <div class="info-item">
                            <div class="info-label">修饰词</div>
                            <div class="info-value">${indicator.modifier}</div>
                        </div>
                        ` : ''}
                        <div class="info-item">
                            <div class="info-label">聚合方式</div>
                            <div class="info-value">${indicator.aggregation}</div>
                        </div>
                        <div class="info-item">
                            <div class="info-label">发布人</div>
                            <div class="info-value">${indicator.publishUser}</div>
                        </div>
                        <div class="info-item">
                            <div class="info-label">发布时间</div>
                            <div class="info-value">${indicator.publishTime}</div>
                        </div>
                    </div>
                </div>

                <div class="modal-card">
                    <div class="modal-card-header">
                        访问次数统计
                    </div>

                    </div>
                    <div class="chart-container">
                        <canvas id="accessChart"></canvas>
                    </div>
                </div>

                            </tr>
                        </thead>
                        <tbody>
                            ${indicator.sampleData.map(row => `
                                <tr>
                                    <td>${row.institution}</td>
                                    <td>${row.month || row.quarter}</td>
                                    <td>${typeof row.value === 'number' ? row.value.toLocaleString() : row.value}</td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                </div>

                <div class="modal-card">
                    <div class="modal-card-header">
                        指标被调详情
                    </div>
                    <div class="usage-list">
                        ${indicator.usageList.map(usage => `
                            <div class="usage-item">
                                <div class="usage-info">
                                    <h4>${usage.app} (${usage.type})</h4>
                                    <p>最后调用：${usage.lastCall}</p>
                                </div>
                                <div class="usage-count">${usage.count}次</div>

                        `).join('')}
                    </div>

                    <div class="modal-card-header">
                        指标全生命周期
                    </div>
                    <div class="lifecycle-timeline">
                        ${indicator.lifecycle.map((stage) => `
                            <div class="timeline-item">
                                <div class="timeline-dot ${stage.status}"></div>
                                <div class="timeline-content">
                                    <div class="timeline-title">
                                        ${stage.stage}
                                        <span class="timeline-status ${stage.status}">
                                            ${stage.status === 'completed' ? '已完成' : stage.status === 'in-progress' ? '进行中' : '未开始'}
                                        </span>
                                    </div>
                                    <div class="timeline-detail">${stage.detail.replace(/\n/g, '<br>')}</div>
                                    <div class="timeline-time">完成时间：${stage.time}</div>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;

            document.getElementById('indicatorModal').classList.add('show');

            setTimeout(() => {
                renderChart(indicator);
            }, 100);
        }

        function closeModal() {
            document.getElementById('indicatorModal').classList.remove('show');
            if (chartInstance) {
                chartInstance.destroy();
                chartInstance = null;
            }
        }

        function renderChart(indicator) {
            const ctx = document.getElementById('accessChart');
            if (!ctx) return;

            if (chartInstance) {
                chartInstance.destroy();
            }

            const days = [];
            const today = new Date();
            for (let i = 6; i >= 0; i--) {
                const date = new Date(today);
                date.setDate(date.getDate() - i);
                days.push(`${date.getMonth() + 1}/${date.getDate()}`);
            }

            chartInstance = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: days,
                    datasets: [{
                        label: '调用次数',
                        data: indicator.accessCount,
                        borderColor: '#1890ff',
                        backgroundColor: 'rgba(24, 144, 255, 0.1)',
                        borderWidth: 3,
                        tension: 0.4,
                        fill: true,
                        pointBackgroundColor: '#1890ff',
                        pointBorderColor: '#fff',
                        pointBorderWidth: 2,
                        pointRadius: 5,
                        pointHoverRadius: 7
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            display: false
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            grid: {
                                color: '#f0f0f0'
                            }
                        },
                        x: {
                            grid: {
                                display: false
                            }
                        }
                    }
                }
            });
        }

        document.getElementById('indicatorModal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeModal();
            }
        });

        renderIndicatorList();
    </script>
