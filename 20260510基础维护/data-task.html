<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数据任务管理</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/common.css">
    <style>
        .stats-chart {
            background: #fff;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            box-sizing: border-box;
            width: 100%;
        }
        .chart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 1px solid #f0f0f0;
        }
        .chart-title {
            font-size: 16px;
            font-weight: 600;
            color: #333;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .chart-period {
            display: flex;
            gap: 8px;
        }
        .period-btn {
            padding: 6px 14px;
            border: 1px solid #d9d9d9;
            background: #fff;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.3s;
        }
        .period-btn:hover, .period-btn.active {
            background: #2d8cff;
            color: #fff;
            border-color: #2d8cff;
        }
        .simple-bar-chart {
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            height: 180px;
            padding: 20px 30px;
            margin: 0 auto;
            max-width: 800px;
        }
        .bar-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            flex: 1;
            max-width: 60px;
        }
        .bar-stack {
            display: flex;
            flex-direction: column-reverse;
            align-items: center;
            gap: 4px;
            width: 100%;
        }
        .bar {
            width: 32px;
            border-radius: 4px 4px 0 0;
            transition: all 0.3s;
        }
        .bar.success {
            background: #52c41a;
        }
        .bar.fail {
            background: #ff4d4f;
        }
        .bar-label {
            font-size: 12px;
            color: #666;
            margin-top: 8px;
        }
        .bar-value {
            font-size: 12px;
            font-weight: 600;
            color: #333;
        }
        .bar-value.success {
            color: #52c41a;
        }
        .bar-value.fail {
            color: #ff4d4f;
        }
        .chart-legend {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-top: 20px;
            padding-top: 15px;
            border-top: 1px solid #f0f0f0;
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: #666;
        }
        .legend-color {
            width: 12px;
            height: 12px;
            border-radius: 2px;
        }
        .task-status {
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 12px;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }
        .status-success {
            background: #f6ffed;
            color: #52c41a;
            border: 1px solid #b7eb8f;
        }
        .status-fail {
            background: #fff1f0;
            color: #ff4d4f;
            border: 1px solid #ffa39e;
        }
        .status-running {
            background: #e6f7ff;
            color: #1890ff;
            border: 1px solid #91d5ff;
        }
        .status-pending {
            background: #fff7e6;
            color: #fa8c16;
            border: 1px solid #ffd591;
        }
        .cycle-badge {
            padding: 2px 8px;
            background: #f0f0f0;
            border-radius: 4px;
            font-size: 12px;
            color: #666;
        }
    </style>
</head>
<body>
    <header class="page-header">
        <h1 class="page-title"><i class="fas fa-tasks"></i>数据任务管理</h1>
    </header>

    <section class="stats-chart">
        <div class="chart-header">
            <span class="chart-title"><i class="fas fa-chart-bar" style="color: #2d8cff;"></i>任务执行统计</span>
            <div class="chart-period">
                <button class="period-btn active">当日</button>
                <button class="period-btn">近7日</button>
                <button class="period-btn">近30日</button>
            </div>
        </div>
        <div class="simple-bar-chart">
            <div class="bar-item">
                <div class="bar-stack">
                    <span class="bar-value success">45</span>
                    <div class="bar success" style="height: 90px;"></div>
                    <div class="bar fail" style="height: 20px;"></div>
                    <span class="bar-value fail">3</span>
                </div>
                <span class="bar-label">00:00</span>
            </div>
            <div class="bar-item">
                <div class="bar-stack">
                    <span class="bar-value success">52</span>
                    <div class="bar success" style="height: 104px;"></div>
                    <div class="bar fail" style="height: 8px;"></div>
                    <span class="bar-value fail">1</span>
                </div>
                <span class="bar-label">04:00</span>
            </div>
            <div class="bar-item">
                <div class="bar-stack">
                    <span class="bar-value success">38</span>
                    <div class="bar success" style="height: 76px;"></div>
                    <div class="bar fail" style="height: 32px;"></div>
                    <span class="bar-value fail">5</span>
                </div>
                <span class="bar-label">08:00</span>
            </div>
            <div class="bar-item">
                <div class="bar-stack">
                    <span class="bar-value success">61</span>
                    <div class="bar success" style="height: 122px;"></div>
                    <div class="bar fail" style="height: 12px;"></div>
                    <span class="bar-value fail">2</span>
                </div>
                <span class="bar-label">12:00</span>
            </div>
            <div class="bar-item">
                <div class="bar-stack">
                    <span class="bar-value success">48</span>
                    <div class="bar success" style="height: 96px;"></div>
                    <div class="bar fail" style="height: 4px;"></div>
                    <span class="bar-value fail">0</span>
                </div>
                <span class="bar-label">16:00</span>
            </div>
            <div class="bar-item">
                <div class="bar-stack">
                    <span class="bar-value success">55</span>
                    <div class="bar success" style="height: 110px;"></div>
                    <div class="bar fail" style="height: 24px;"></div>
                    <span class="bar-value fail">4</span>
                </div>
                <span class="bar-label">20:00</span>
            </div>
        </div>
        <div class="chart-legend">
            <div class="legend-item">
                <span class="legend-color" style="background: #52c41a;"></span> 成功
            </div>
            <div class="legend-item">
                <span class="legend-color" style="background: #ff4d4f;"></span> 失败
            </div>
        </div>
    </section>

    <section class="search-area">
        <div class="search-form">
            <div class="form-group">
                <label class="form-label">任务名称：</label>
                <input type="text" class="form-input" id="searchName" placeholder="请输入任务名称">
            </div>
            <div class="form-group">
                <label class="form-label">调度周期：</label>
                <select class="form-select" id="searchCycle">
                    <option value="">全部</option>
                    <option value="hourly">每小时</option>
                    <option value="daily">每日</option>
                    <option value="weekly">每周</option>
                    <option value="monthly">每月</option>
                </select>
            </div>
            <div class="form-group">
                <label class="form-label">执行状态：</label>
                <select class="form-select" id="searchStatus">
                    <option value="">全部</option>
                    <option value="success">成功</option>
                    <option value="fail">失败</option>
                    <option value="running">运行中</option>
                    <option value="pending">待执行</option>
                </select>
            </div>
            <div class="form-group">
                <button class="btn btn-success" onclick="handleSearch()">
                    <i class="fas fa-search"></i> 查询
                </button>
                <button class="btn btn-default" onclick="handleReset()">
                    <i class="fas fa-redo"></i> 重置
                </button>
            </div>
        </div>
    </section>

    <section class="table-container">
        <div class="table-toolbar">
            <div class="toolbar-left">
                <span class="table-title">数据任务台账</span>
                <span class="record-count">共 <strong id="totalCount">0</strong> 条记录</span>
            </div>
            <div class="toolbar-right">
                <button class="btn btn-primary" onclick="handleAdd()">
                    <i class="fas fa-plus"></i> 新增
                </button>
                <button class="btn btn-warning" onclick="handleExport()">
                    <i class="fas fa-download"></i> 导出
                </button>
            </div>
        </div>
        <table class="data-table">
            <thead>
                <tr>
                    <th style="width: 60px;">序号</th>
                    <th>任务名称</th>
                    <th>调度周期</th>
                    <th>最后执行时间</th>
                    <th>执行状态</th>
                    <th>下次执行时间</th>
                    <th style="width: 200px;">操作</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
        <div class="pagination">
            <button class="page-btn" disabled><i class="fas fa-chevron-left"></i></button>
            <button class="page-btn active">1</button>
            <button class="page-btn">2</button>
            <button class="page-btn"><i class="fas fa-chevron-right"></i></button>
            <span class="page-info">共 2 页</span>
        </div>
    </section>

    <div class="modal" id="taskModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 class="modal-title" id="modalTitle">新增数据任务</h3>
                <button class="modal-close" onclick="Modal.close('taskModal')">&times;</button>
            </div>
            <div class="modal-body">
                <form id="taskForm">
                    <div class="form-row">
                        <div class="form-col">
                            <div class="form-group">
                                <label class="form-label required">任务名称</label>
                                <input type="text" class="form-input" id="taskName" placeholder="请输入任务名称">
                            </div>
                        </div>
                        <div class="form-col">
                            <div class="form-group">
                                <label class="form-label">调度周期</label>
                                <select class="form-select" id="taskCycle">
                                    <option value="hourly">每小时</option>
                                    <option value="daily">每日</option>
                                    <option value="weekly">每周</option>
                                    <option value="monthly">每月</option>
                                </select>
                            </div>
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">任务描述</label>
                        <textarea class="form-textarea" id="taskDesc" rows="3" placeholder="请输入任务描述"></textarea>
                    </div>
                    <div class="form-row">
                        <div class="form-col">
                            <div class="form-group">
                                <label class="form-label">执行时间</label>
                                <input type="time" class="form-input" id="taskTime" value="02:00">
                            </div>
                        </div>
                        <div class="form-col">
                            <div class="form-group">
                                <label class="form-label">数据源</label>
                                <select class="form-select" id="taskSource">
                                    <option value="his">HIS系统</option>
                                    <option value="lis">LIS系统</option>
                                    <option value="ris">RIS系统</option>
                                    <option value="pacs">PACS系统</option>
                                </select>
                            </div>
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn btn-default" onclick="Modal.close('taskModal')">取消</button>
                <button class="btn btn-primary" onclick="handleSave()">保存</button>
            </div>
        </div>
    </div>

    <div class="modal" id="deleteModal">
        <div class="modal-content modal-sm">
            <div class="modal-header">
                <h3 class="modal-title">确认删除</h3>
                <button class="modal-close" onclick="Modal.close('deleteModal')">&times;</button>
            </div>
            <div class="modal-body">
                <p style="text-align: center; padding: 20px;">确定要删除该数据任务吗？此操作不可恢复。</p>
            </div>
            <div class="modal-footer">
                <button class="btn btn-default" onclick="Modal.close('deleteModal')">取消</button>
                <button class="btn btn-danger" onclick="confirmDelete()">删除</button>
            </div>
        </div>
    </div>

    <script src="js/common.js"></script>
    <script>
        const PageData = {
            list: [
                { id: 1, name: '检验数据抽取', cycle: 'hourly', lastTime: '2024-01-18 09:00:00', status: 'success', nextTime: '2024-01-18 10:00:00' },
                { id: 2, name: '检查数据抽取', cycle: 'hourly', lastTime: '2024-01-18 09:00:00', status: 'success', nextTime: '2024-01-18 10:00:00' },
                { id: 3, name: '患者数据同步', cycle: 'daily', lastTime: '2024-01-18 02:00:00', status: 'fail', nextTime: '2024-01-19 02:00:00' },
                { id: 4, name: '影像数据归档', cycle: 'daily', lastTime: '2024-01-18 03:00:00', status: 'running', nextTime: '2024-01-19 03:00:00' },
                { id: 5, name: '统计数据汇总', cycle: 'weekly', lastTime: '2024-01-14 04:00:00', status: 'success', nextTime: '2024-01-21 04:00:00' },
                { id: 6, name: '历史数据清理', cycle: 'monthly', lastTime: '2024-01-01 05:00:00', status: 'pending', nextTime: '2024-02-01 05:00:00' }
            ],
            currentEditId: null,
            deleteId: null
        };

        document.addEventListener('DOMContentLoaded', function() {
            renderTable(PageData.list);
            Modal.initClickOutside('taskModal');
            Modal.initClickOutside('deleteModal');
        });

        function renderTable(data) {
            Table.render({
                containerId: 'tableBody',
                data: data,
                rowRenderer: (item, index) => {
                    const cycleMap = { hourly: '每小时', daily: '每日', weekly: '每周', monthly: '每月' };
                    const statusMap = {
                        success: { class: 'status-success', icon: 'fa-check-circle', text: '成功' },
                        fail: { class: 'status-fail', icon: 'fa-times-circle', text: '失败' },
                        running: { class: 'status-running', icon: 'fa-spinner fa-spin', text: '运行中' },
                        pending: { class: 'status-pending', icon: 'fa-clock', text: '待执行' }
                    };
                    const status = statusMap[item.status];
                    return `
                        <td>${index + 1}</td>
                        <td>${item.name}</td>
                        <td><span class="cycle-badge">${cycleMap[item.cycle]}</span></td>
                        <td>${item.lastTime}</td>
                        <td><span class="task-status ${status.class}"><i class="fas ${status.icon}"></i> ${status.text}</span></td>
                        <td>${item.nextTime}</td>
                        <td>
                            <div class="action-btns">
                                <button class="action-btn action-btn-edit" onclick="handleEdit(${item.id})">
                                    <i class="fas fa-edit"></i> 编辑
                                </button>
                                <button class="action-btn action-btn-delete" onclick="handleDelete(${item.id})">
                                    <i class="fas fa-trash"></i> 删除
                                </button>
                            </div>
                        </td>
                    `;
                }
            });
            Table.updateCount('totalCount', data.length);
        }

        function handleSearch() {
            const name = document.getElementById('searchName').value.toLowerCase();
            const cycle = document.getElementById('searchCycle').value;
            const status = document.getElementById('searchStatus').value;
            
            const filtered = PageData.list.filter(item => {
                return (!name || item.name.toLowerCase().includes(name)) &&
                       (!cycle || item.cycle === cycle) &&
                       (!status || item.status === status);
            });
            renderTable(filtered);
        }

        function handleReset() {
            document.getElementById('searchName').value = '';
            document.getElementById('searchCycle').value = '';
            document.getElementById('searchStatus').value = '';
            renderTable(PageData.list);
        }

        function handleAdd() {
            PageData.currentEditId = null;
            document.getElementById('modalTitle').textContent = '新增数据任务';
            document.getElementById('taskForm').reset();
            Modal.open('taskModal');
        }

        function handleEdit(id) {
            PageData.currentEditId = id;
            const item = PageData.list.find(i => i.id === id);
            if (item) {
                document.getElementById('modalTitle').textContent = '编辑数据任务';
                document.getElementById('taskName').value = item.name;
                document.getElementById('taskCycle').value = item.cycle;
                Modal.open('taskModal');
            }
        }

        function handleSave() {
            const name = document.getElementById('taskName').value;
            
            if (!name) {
                alert('请填写任务名称');
                return;
            }
            
            if (PageData.currentEditId) {
                const index = PageData.list.findIndex(i => i.id === PageData.currentEditId);
                if (index !== -1) {
                    PageData.list[index] = {
                        ...PageData.list[index],
                        name,
                        cycle: document.getElementById('taskCycle').value
                    };
                }
            } else {
                const newId = Math.max(...PageData.list.map(i => i.id), 0) + 1;
                PageData.list.push({
                    id: newId,
                    name,
                    cycle: document.getElementById('taskCycle').value,
                    lastTime: '-',
                    status: 'pending',
                    nextTime: new Date().toLocaleString('zh-CN')
                });
            }
            
            Modal.close('taskModal');
            renderTable(PageData.list);
        }

        function handleDelete(id) {
            PageData.deleteId = id;
            Modal.open('deleteModal');
        }

        function confirmDelete() {
            if (PageData.deleteId) {
                PageData.list = PageData.list.filter(i => i.id !== PageData.deleteId);
                renderTable(PageData.list);
            }
            Modal.close('deleteModal');
        }

        function handleExport() {
            alert('导出功能开发中...');
        }

        // 周期按钮切换
        document.querySelectorAll('.period-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.period-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
            });
        });
    </script>
</body>
</html>
