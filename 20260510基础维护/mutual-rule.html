<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>互认规则设置</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/common.css">
    <style>
        .rule-status {
            padding: 4px 12px;
            border-radius: 4px;
            font-size: 12px;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }
        .status-active {
            background: #f6ffed;
            color: #52c41a;
            border: 1px solid #b7eb8f;
        }
        .status-inactive {
            background: #fff2e8;
            color: #fa8c16;
            border: 1px solid #ffd591;
        }
        .rule-type {
            padding: 2px 8px;
            background: #e6f7ff;
            border-radius: 4px;
            font-size: 12px;
            color: #1890ff;
        }
        .config-panel {
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            margin-bottom: 20px;
            overflow: hidden;
        }
        .config-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            background: #fafafa;
            border-bottom: 1px solid #f0f0f0;
        }
        .config-title {
            font-weight: 600;
            color: #333;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .config-content {
            padding: 20px;
        }
        .config-row {
            display: flex;
            gap: 20px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }
        .config-item {
            display: flex;
            flex-direction: column;
            gap: 8px;
            min-width: 200px;
            flex: 1;
        }
        .config-item label {
            font-size: 13px;
            color: #666;
            font-weight: 500;
        }
        .config-item select, .config-item input {
            max-width: 200px;
        }
        .range-inputs {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .range-inputs select {
            width: 100px;
        }
        .switch {
            position: relative;
            display: inline-block;
            width: 48px;
            height: 26px;
        }
        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #ccc;
            transition: .3s;
            border-radius: 26px;
        }
        .slider:before {
            position: absolute;
            content: "";
            height: 20px;
            width: 20px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: .3s;
            border-radius: 50%;
        }
        input:checked + .slider {
            background-color: #2d8cff;
        }
        input:checked + .slider:before {
            transform: translateX(22px);
        }
    </style>
</head>
<body>
    <header class="page-header">
        <h1 class="page-title"><i class="fas fa-gavel"></i>互认规则设置</h1>
    </header>

    <section class="search-area">
        <div class="search-form">
            <div class="form-group">
                <label class="form-label">规则名称：</label>
                <input type="text" class="form-input" id="searchName" placeholder="请输入规则名称">
            </div>
            <div class="form-group">
                <label class="form-label">规则类型：</label>
                <select class="form-select" id="searchType">
                    <option value="">全部</option>
                    <option value="org_level">机构等级</option>
                    <option value="alliance">医联体</option>
                    <option value="dept">科室</option>
                    <option value="org_type">机构类别</option>
                    <option value="project">精准提醒</option>
                </select>
            </div>
            <div class="form-group">
                <label class="form-label">规则状态：</label>
                <select class="form-select" id="searchStatus">
                    <option value="">全部</option>
                    <option value="active">启用</option>
                    <option value="inactive">停用</option>
                </select>
            </div>
            <div class="form-group">
                <button class="btn btn-success" onclick="handleSearch()">
                    <i class="fas fa-search"></i> 查询
                </button>
                <button class="btn btn-default" onclick="handleReset()">
                    <i class="fas fa-redo"></i> 重置
                </button>
            </div>
        </div>
    </section>

    <section class="table-container">
        <div class="table-toolbar">
            <div class="toolbar-left">
                <span class="table-title">互认规则列表</span>
                <span class="record-count">共 <strong id="totalCount">0</strong> 条记录</span>
            </div>
        </div>
        <table class="data-table">
            <thead>
                <tr>
                    <th style="width: 60px;">序号</th>
                    <th>规则名称</th>
                    <th>规则类型</th>
                    <th>状态</th>
                    <th style="width: 200px;">操作</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </section>

    <div class="modal" id="ruleModal">
        <div class="modal-content" style="max-width: 800px;">
            <div class="modal-header">
                <h3 class="modal-title" id="modalTitle">编辑互认规则</h3>
                <button class="modal-close" onclick="Modal.close('ruleModal')">&times;</button>
            </div>
            <div class="modal-body" style="max-height: 60vh; overflow-y: auto;">
                <form id="ruleForm">
                    <input type="hidden" id="ruleId">
                    <div class="config-panel">
                        <div class="config-header">
                            <span class="config-title"><i class="fas fa-info-circle"></i> 规则基本信息</span>
                            <label class="switch">
                                <input type="checkbox" id="ruleEnabled">
                                <span class="slider"></span>
                            </label>
                        </div>
                        <div class="config-content">
                            <div class="config-row">
                                <div class="config-item">
                                    <label>规则名称</label>
                                    <input type="text" class="form-input" id="ruleName" readonly>
                                </div>
                                <div class="config-item">
                                    <label>规则类型</label>
                                    <input type="text" class="form-input" id="ruleTypeText" readonly>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="config-panel">
                        <div class="config-header">
                            <span class="config-title"><i class="fas fa-building"></i> 机构互认等级范围</span>
                        </div>
                        <div class="config-content">
                            <div class="config-row">
                                <div class="config-item">
                                    <label>最低等级</label>
                                    <select class="form-select" id="minLevel">
                                        <option value="1">一级</option>
                                        <option value="2">二级</option>
                                        <option value="3" selected>三级</option>
                                    </select>
                                </div>
                                <div class="config-item">
                                    <label>最高等级</label>
                                    <select class="form-select" id="maxLevel">
                                        <option value="1">一级</option>
                                        <option value="2">二级</option>
                                        <option value="3" selected>三级</option>
                                    </select>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="config-panel">
                        <div class="config-header">
                            <span class="config-title"><i class="fas fa-network-wired"></i> 医联体/医共体范围</span>
                        </div>
                        <div class="config-content">
                            <div class="config-item">
                                <label>选择医联体/医共体</label>
                                <select class="form-select" id="allianceSelect" multiple style="height: 100px;">
                                    <option value="all" selected>全部医联体/医共体</option>
                                    <option value="alliance1">市域医疗联合体</option>
                                    <option value="alliance2">东部医共体</option>
                                    <option value="alliance3">西部医共体</option>
                                    <option value="alliance4">南部医共体</option>
                                    <option value="alliance5">北部医共体</option>
                                </select>
                                <span style="font-size: 12px; color: #999;">按住Ctrl键可多选</span>
                            </div>
                        </div>
                    </div>

                    <div class="config-panel">
                        <div class="config-header">
                            <span class="config-title"><i class="fas fa-hospital-user"></i> 科室精准互认范围</span>
                        </div>
                        <div class="config-content">
                            <div class="config-row">
                                <div class="config-item">
                                    <label>适用科室类型</label>
                                    <select class="form-select" id="deptType">
                                        <option value="all">全部科室</option>
                                        <option value="clinical">临床科室</option>
                                        <option value="auxiliary">辅助科室</option>
                                        <option value="special">特殊科室</option>
                                    </select>
                                </div>
                                <div class="config-item">
                                    <label>科室名称</label>
                                    <select class="form-select" id="deptNames" multiple style="height: 100px;">
                                        <option value="all" selected>全部科室</option>
                                        <option value="dept1">检验科</option>
                                        <option value="dept2">影像科</option>
                                        <option value="dept3">心内科</option>
                                        <option value="dept4">外科</option>
                                        <option value="dept5">内科</option>
                                    </select>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="config-panel">
                        <div class="config-header">
                            <span class="config-title"><i class="fas fa-building-alt"></i> 机构类别精准互认范围</span>
                        </div>
                        <div class="config-content">
                            <div class="config-row">
                                <div class="config-item">
                                    <label>机构类别</label>
                                    <select class="form-select" id="orgCategory">
                                        <option value="all">全部类别</option>
                                        <option value="general">综合医院</option>
                                        <option value="specialized">专科医院</option>
                                        <option value="traditional">中医医院</option>
                                        <option value="maternity">妇幼保健院</option>
                                        <option value="community">社区卫生服务中心</option>
                                    </select>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="config-panel">
                        <div class="config-header">
                            <span class="config-title"><i class="fas fa-stethoscope"></i> 精准提醒互认项目范围</span>
                        </div>
                        <div class="config-content">
                            <div class="config-row">
                                <div class="config-item">
                                    <label>项目类型</label>
                                    <select class="form-select" id="projectType">
                                        <option value="all">全部项目</option>
                                        <option value="check">检查项目</option>
                                        <option value="test">检验项目</option>
                                    </select>
                                </div>
                                <div class="config-item">
                                    <label>项目名称</label>
                                    <select class="form-select" id="projectNames" multiple style="height: 100px;">
                                        <option value="all" selected>全部项目</option>
                                        <option value="proj1">血常规检查</option>
                                        <option value="proj2">尿常规检查</option>
                                        <option value="proj3">肝功能检查</option>
                                        <option value="proj4">CT检查</option>
                                        <option value="proj5">MRI检查</option>
                                    </select>
                                </div>
                            </div>
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn btn-default" onclick="Modal.close('ruleModal')">取消</button>
                <button class="btn btn-primary" onclick="handleSave()">保存修改</button>
            </div>
        </div>
    </div>

    <script src="js/common.js"></script>
    <script>
        const PageData = {
            list: [
                { id: 1, name: '同级医疗机构互认', type: 'org_level', typeText: '机构等级', enabled: true },
                { id: 2, name: '医联体内部互认', type: 'alliance', typeText: '医联体', enabled: true },
                { id: 3, name: '科室精准互认', type: 'dept', typeText: '科室', enabled: false },
                { id: 4, name: '机构类别互认', type: 'org_type', typeText: '机构类别', enabled: true },
                { id: 5, name: '精准提醒互认', type: 'project', typeText: '精准提醒', enabled: true }
            ],
            currentEditId: null
        };

        document.addEventListener('DOMContentLoaded', function() {
            renderTable(PageData.list);
            Modal.initClickOutside('ruleModal');
        });

        function renderTable(data) {
            Table.render({
                containerId: 'tableBody',
                data: data,
                rowRenderer: (item, index) => {
                    const statusClass = item.enabled ? 'status-active' : 'status-inactive';
                    const statusText = item.enabled ? '启用' : '停用';
                    const statusIcon = item.enabled ? 'fa-check-circle' : 'fa-ban';
                    return `
                        <td>${index + 1}</td>
                        <td>${item.name}</td>
                        <td><span class="rule-type">${item.typeText}</span></td>
                        <td><span class="rule-status ${statusClass}"><i class="fas ${statusIcon}"></i> ${statusText}</span></td>
                        <td>
                            <div class="action-btns">
                                <button class="action-btn action-btn-edit" onclick="handleEdit(${item.id})">
                                    <i class="fas fa-edit"></i> 修改
                                </button>
                                <button class="action-btn ${item.enabled ? 'action-btn-delete' : 'action-btn-success'}" onclick="toggleStatus(${item.id})">
                                    <i class="fas ${item.enabled ? 'fa-power-off' : 'fa-power-on'}"></i> ${item.enabled ? '停用' : '启用'}
                                </button>
                            </div>
                        </td>
                    `;
                }
            });
            Table.updateCount('totalCount', data.length);
        }

        function handleSearch() {
            const name = document.getElementById('searchName').value.toLowerCase();
            const type = document.getElementById('searchType').value;
            const status = document.getElementById('searchStatus').value;

            const filtered = PageData.list.filter(item => {
                return (!name || item.name.toLowerCase().includes(name)) &&
                       (!type || item.type === type) &&
                       (status === '' || (status === 'active' ? item.enabled : !item.enabled));
            });
            renderTable(filtered);
        }

        function handleReset() {
            document.getElementById('searchName').value = '';
            document.getElementById('searchType').value = '';
            document.getElementById('searchStatus').value = '';
            renderTable(PageData.list);
        }

        function handleEdit(id) {
            PageData.currentEditId = id;
            const item = PageData.list.find(i => i.id === id);
            if (item) {
                document.getElementById('modalTitle').textContent = '编辑互认规则 - ' + item.name;
                document.getElementById('ruleId').value = item.id;
                document.getElementById('ruleName').value = item.name;
                document.getElementById('ruleTypeText').value = item.typeText;
                document.getElementById('ruleEnabled').checked = item.enabled;
                Modal.open('ruleModal');
            }
        }

        function toggleStatus(id) {
            const item = PageData.list.find(i => i.id === id);
            if (item) {
                item.enabled = !item.enabled;
                renderTable(PageData.list);
                alert(item.enabled ? '规则已启用' : '规则已停用');
            }
        }

        function handleSave() {
            const id = parseInt(document.getElementById('ruleId').value);
            const item = PageData.list.find(i => i.id === id);
            if (item) {
                item.enabled = document.getElementById('ruleEnabled').checked;
                renderTable(PageData.list);
            }
            Modal.close('ruleModal');
            alert('规则配置已保存');
        }
    </script>
</body>
</html>
